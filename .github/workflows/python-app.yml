name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./example-app  # Ustawienie katalogu roboczego

    steps:
    - uses: actions/checkout@v4  # Checkout the code
    - name: Set up Python 3.9
      uses: actions/setup-python@v3
      with:
        python-version: "3.9"
    
    # Install Poetry
    - name: Install Poetry
      uses: snok/install-poetry@v1.3.4
      with:
        version: "latest"
        virtualenvs-create: true
        virtualenvs-in-project: true

    # Install dependencies with Poetry
    - name: Install dependencies with Poetry
      run: |
        poetry install --no-root

    # Install flake8 as a dev dependency
    - name: Install flake8
      run: |
        poetry add --dev flake8

    # Make sure flake8 is available and check its version
    - name: Check flake8 version
      run: |
        poetry run flake8 --version

    # Lint with flake8 (with error ignoring for F821)
    - name: Lint with flake8
      run: |
        poetry run flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --ignore=F821
        poetry run flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    # Test with pytest
    - name: Test with pytest
      run: |
        poetry run pytest
