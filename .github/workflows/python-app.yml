name: Python application

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./example-app

    steps:
      # Pobranie repozytorium
      - name: Checkout repository
        uses: actions/checkout@v4

      # Ustawienie Pythona
      - name: Set up Python 3.11
        uses: actions/setup-python@v3
        with:
          python-version: "3.11"

      # Instalacja Poetry ręcznie
      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry
          echo "Poetry zainstalowane w ścieżce:"
          python -m site --user-base  # Sprawdzenie ścieżki instalacji poetry
          echo "$HOME/.local/bin" >> $GITHUB_PATH  # Dodanie ścieżki do PATH
          export PATH="$HOME/.local/bin:$PATH"
          echo "Ścieżka PATH: $PATH"  # Sprawdzenie, czy ścieżka jest dodana poprawnie

      # Weryfikacja instalacji Poetry
      - name: Verify Poetry installation
        run: |
          which poetry || echo "Poetry nie znaleziono"
          poetry --version || echo "Błąd podczas uruchamiania poetry"

      # Instalacja zależności
      - name: Install dependencies
        run: |
          poetry install --no-interaction --no-root

      # Testy jednostkowe
      - name: Run pytest
        run: |
          poetry run pytest

  lint:
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: ./example-app
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Przywrócenie pamięci podręcznej Poetry
      - name: Restore Poetry Cache
        uses: actions/cache@v3
        with:
          path: ./example-app/.venv
          key: ${{ runner.os }}-poetry-${{ hashFiles('./example-app/poetry.lock') }}

      # Instalacja zależności (jeśli pamięć podręczna jest pusta)
      - name: Install dependencies (if cache is missing)
        run: |
          poetry install --no-interaction --no-root

      # Uruchomienie lintera (flake8)
      - name: Run linter (flake8)
        run: |
          poetry run flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  formatter:
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: ./example-app
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Przywrócenie pamięci podręcznej Poetry
      - name: Restore Poetry Cache
        uses: actions/cache@v3
        with:
          path: ./example-app/.venv
          key: ${{ runner.os }}-poetry-${{ hashFiles('./example-app/poetry.lock') }}

      # Instalacja zależności (jeśli pamięć podręczna jest pusta)
      - name: Install dependencies (if cache is missing)
        run: |
          poetry install --no-interaction --no-root

      # Sprawdzenie formatowania kodu z Black
      - name: Check code format with black
        run: |
          poetry run black --check .

  security:
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: ./example-app
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Przywrócenie pamięci podręcznej Poetry
      - name: Restore Poetry Cache
        uses: actions/cache@v3
        with:
          path: ./example-app/.venv
          key: ${{ runner.os }}-poetry-${{ hashFiles('./example-app/poetry.lock') }}

      # Instalacja zależności (jeśli pamięć podręczna jest pusta)
      - name: Install dependencies (if cache is missing)
        run: |
          poetry install --no-interaction --no-root

      # Uruchomienie testów bezpieczeństwa (Bandit)
      - name: Run Bandit security checks
        run: |
          poetry run bandit -r .

  unittests:
    runs-on: ubuntu-latest
    needs: [lint, formatter, security]
    defaults:
      run:
        working-directory: ./example-app
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Przywrócenie pamięci podręcznej Poetry
      - name: Restore Poetry Cache
        uses: actions/cache@v3
        with:
          path: ./example-app/.venv
          key: ${{ runner.os }}-poetry-${{ hashFiles('./example-app/poetry.lock') }}

      # Instalacja zależności (jeśli pamięć podręczna jest pusta)
      - name: Install dependencies (if cache is missing)
        run: |
          poetry install --no-interaction --no-root

      # Uruchomienie testów jednostkowych (pytest)
      - name: Run pytest
        run: |
          poetry run pytest

