name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  # Job dla instalacji zależności
  install_dependencies:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.10
        uses: actions/setup-python@v3
        with:
          python-version: "3.10"
      
      # Instalacja Poetry
      - name: Install Poetry
        uses: snok/install-poetry@v1.3.4
        with:
          version: 'latest'
      
      # Instalacja zależności
      - name: Install dependencies with Poetry
        run: |
          poetry install --no-root

  # Job dla testów statycznych
  static_analysis:
    runs-on: ubuntu-latest
    needs: install_dependencies  # Ten job czeka na zakończenie jobu install_dependencies
    steps:
      - uses: actions/checkout@v4

      # Linter
      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      # Formatter
      - name: Format with black
        run: |
          black --check .  # Sprawdza, czy kod jest zgodny z formatowaniem

      # Security checks with bandit
      - name: Security checks with bandit
        run: |
          bandit -r ./example-app  # Uruchamia testy bezpieczeństwa w katalogu example-app

  # Job dla testów jednostkowych
  unit_tests:
    runs-on: ubuntu-latest
    needs: install_dependencies  # Ten job również czeka na zakończenie install_dependencies
    steps:
      - uses: actions/checkout@v4

      # Testowanie za pomocą pytest
      - name: Test with pytest
        run: |
          poetry run pytest  # Uruchamia testy jednostkowe z wykorzystaniem Poetry
