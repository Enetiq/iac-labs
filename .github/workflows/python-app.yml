name: Python application

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./example-app

    steps:
      # Pobranie repozytorium
      - name: Checkout repository
        uses: actions/checkout@v4

      # Ustawienie Pythona
      - name: Set up Python 3.11
        uses: actions/setup-python@v3
        with:
          python-version: "3.11"

      # Instalacja Poetry ręcznie
      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry
          echo "$HOME/.local/bin" >> $GITHUB_PATH  # Dodanie ścieżki do PATH
          export PATH="$HOME/.local/bin:$PATH"    # Ustawienie ścieżki

      # Instalacja zależności
      - name: Install dependencies
        run: |
          poetry install --no-interaction --no-root

  lint:
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: ./example-app
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Instalacja zależności, jeśli cache jest puste
      - name: Install dependencies
        run: |
          poetry install --no-interaction --no-root

      # Uruchomienie lintera (flake8)
      - name: Run flake8 linter (ignore errors)
        run: |
          poetry run flake8 . || echo "Linting failed, but continuing"

  formatter:
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: ./example-app
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Instalacja zależności, jeśli cache jest puste
      - name: Install dependencies
        run: |
          poetry install --no-interaction --no-root

      # Sprawdzenie formatowania kodu (black)
      - name: Run black formatter (ignore errors)
        run: |
          poetry run black --check . || echo "Formatting check failed, but continuing"

  security:
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: ./example-app
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Instalacja zależności, jeśli cache jest puste
      - name: Install dependencies
        run: |
          poetry install --no-interaction --no-root

      # Uruchomienie testów bezpieczeństwa (bandit)
      - name: Run Bandit security checks (ignore errors)
        run: |
          poetry run bandit -r . || echo "Security check failed, but continuing"

  unittests:
    runs-on: ubuntu-latest
    needs: [lint, formatter, security]
    defaults:
      run:
        working-directory: ./example-app
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Instalacja zależności, jeśli cache jest puste
      - name: Install dependencies
        run: |
          poetry install --no-interaction --no-root

      # Uruchomienie testów jednostkowych (pytest)
      - name: Run pytest (ignore errors)
        run: |
          poetry run pytest || echo "Unit tests failed, but continuing"

  success:
    runs-on: ubuntu-latest
    needs: [build, lint, formatter, security, unittests]
    steps:
      - name: Workflow finished successfully
        run: echo "Workflow zakończony pomyślnie!"
